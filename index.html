<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת גלישה ותגמולים</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="container">
        <div class="auth-box">
            <h2 id="auth-title">התחברות למערכת</h2>
            
            <div id="register-fields" style="display: none;">
                <input type="text" id="reg-name" placeholder="שם מלא">
                <input type="tel" id="reg-phone" placeholder="מספר טלפון">
            </div>
            
            <input type="email" id="auth-email" placeholder="אימייל">
            <input type="password" id="auth-password" placeholder="סיסמה">
            
            <button id="btn-primary" onclick="handleAuthAction()">התחבר</button>
            <p id="toggle-auth-text" onclick="toggleAuthMode()">אין לך חשבון? להרשמה לחץ כאן</p>
        </div>
    </div>

    <div id="dashboard-screen" class="container" style="display: none;">
        <header>
            <h1>ברוך הבא, <span id="user-name-display">גולש</span>!</h1>
            <button class="btn-logout" onclick="auth.signOut()">התנתק</button>
        </header>

        <main>
            <div class="stats-grid">
                <div class="card">
                    <h3>הארנק שלי</h3>
                    <p id="money-counter" class="counter">₪0.00</p>
                </div>
                <div class="card">
                    <h3>זמן גלישה במערכת</h3>
                    <p id="time-counter" class="counter">00:00:00</p>
                </div>
            </div>

            <div id="time-lock-warning" class="warning-banner">
                ⚠️ חובה להשלים שעה אחת במצטבר (01:00:00) של פעילות באתר כדי להפעיל את מנגנון צבירת הכספים בארנק.
            </div>

            <div class="content-section">
                <h3>המשימות והתכנים שלך</h3>
                <div id="dynamic-content-area">
                    <p>טוען תכנים ומשימות...</p>
                </div>
            </div>
        </main>

        <footer>
            <a id="whatsapp-support-btn" href="https://wa.me/972500000000?text=%D7%94%D7%99%D7%99%D7%8C%20%D7%A9%D7%9E%D7%99%20" target="_blank" class="whatsapp-button">
                💬 שירות לקוחות ב-WhatsApp
            </a>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

    <script src="app.js"></script>
</body>
</html>
